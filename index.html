<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Lnhat update 1.3 - Supreme Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* ================================================================
           PHẦN 1: CSS GỐC V16.2 (GIỮ NGUYÊN 100% - KHÔNG CHỈNH SỬA)
           ================================================================
        */
        :root { 
            --primary: #f1c40f; 
            --success: #2ecc71; 
            --danger: #e74c3c; 
            --bg-dark: #121212; 
            --blue: #3498db; 
            --purple: #9b59b6; 
            --night: #2c3e50; 
            --day: #f39c12; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-dark); 
            color: white; 
            text-align: center; 
            margin: 0; 
            padding: 10px; 
            touch-action: pan-y; 
            -webkit-user-select: none;
            user-select: none;
        }
        
        .container { 
            max-width: 420px; 
            margin: auto; 
            background: #222; 
            padding: 15px; 
            border-radius: 25px; 
            border: 1px solid #333; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            overflow: hidden; 
        }
        
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border-radius: 10px; 
            border: 1px solid #444; 
            background: #333; 
            color: white; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        
        button { 
            width: 100%; 
            padding: 12px; 
            margin-top: 8px; 
            border-radius: 10px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s; 
            font-size: 14px;
            text-transform: uppercase;
        }
        
        button:active { 
            transform: scale(0.98); 
        }
        
        .hidden { 
            display: none !important; 
        }
        
        /* --- CHẴN LẺ STYLES --- */
        .balance-card { 
            background: linear-gradient(135deg, #333, #222); 
            padding: 15px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            border: 1px solid var(--primary); 
        }
        
        .balance-amount { 
            font-size: 26px; 
            color: var(--primary); 
            font-weight: bold; 
        }
        
        .leaderboard { 
            background: #1a1a1a; 
            border-radius: 15px; 
            border: 1px solid #444; 
            padding: 12px; 
            margin-bottom: 15px; 
            text-align: left; 
        }
        
        .leaderboard h4 { 
            margin: 0 0 10px 0; 
            color: var(--primary); 
            text-align: center; 
            font-size: 14px; 
            letter-spacing: 1px; 
        }
        
        .lb-item { 
            display: flex; 
            justify-content: space-between; 
            font-size: 13px; 
            border-bottom: 1px solid #333; 
            padding: 8px 0; 
            align-items: center;
        }
        
        .lb-item:last-child { 
            border-bottom: none; 
        }

        .dice-area { 
            position: relative; 
            width: 220px; 
            height: 120px; 
            margin: 20px auto; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #111;
            border-radius: 60px;
            border: 4px solid #333;
        }
        
        .dice-container { 
            display: flex; 
            gap: 12px; 
            z-index: 5; 
        }
        
        .dice { 
            width: 50px; 
            height: 50px; 
            background: white; 
            color: black; 
            border-radius: 10px; 
            line-height: 50px; 
            font-size: 26px; 
            font-weight: bold; 
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }
        
        .bowl { 
            position: absolute; 
            top: -5px; 
            left: -5px; 
            width: 230px; 
            height: 130px; 
            background: radial-gradient(circle at 50% 20%, #7f8c8d, #2c3e50); 
            border-radius: 115px 115px 20px 20px; 
            z-index: 10; 
            cursor: grab; 
            box-shadow: 0 15px 25px rgba(0,0,0,0.8); 
            transform: translateY(-180px); 
            opacity: 0; 
            touch-action: none; 
            border: 3px solid #555; 
        }

        .btn-group { 
            display: flex; 
            gap: 10px; 
            margin-top: 15px; 
        }
        
        .btn-group button { 
            flex: 1; 
            font-size: 22px; 
            color: white; 
            height: 70px; 
            border-bottom: 5px solid rgba(0,0,0,0.3); 
        }
        
        .bet-info-container { 
            display: flex; 
            gap: 10px; 
            margin-top: 10px; 
        }
        
        .bet-pool { 
            flex: 1; 
            background: #1a1a1a; 
            padding: 8px; 
            border-radius: 12px; 
            border: 1px solid #333; 
        }
        
        .pool-label { 
            font-size: 11px; 
            color: #888; 
            margin-bottom: 3px; 
        }
        
        .pool-amount { 
            font-size: 15px; 
            color: var(--primary); 
            font-weight: bold; 
        }

        .quick-bet { 
            display: flex; 
            gap: 5px; 
            margin-bottom: 10px; 
        }
        
        .quick-bet button { 
            flex: 1; 
            padding: 8px; 
            font-size: 12px; 
            background: #2a2a2a; 
            color: white; 
            border: 1px solid #444; 
        }

        #timer-box { 
            font-size: 40px; 
            color: var(--primary); 
            font-weight: bold; 
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.4); 
        }
        
        #status { 
            font-size: 16px; 
            margin: 10px 0; 
            min-height: 24px; 
            color: #f1c40f; 
            font-weight: bold; 
        }

        #chat-box { 
            background: #1a1a1a; 
            border-radius: 15px; 
            border: 1px solid #333; 
            margin-top: 15px; 
            text-align: left; 
            display: flex; 
            flex-direction: column; 
            height: 150px; 
        }
        
        #chat-content { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 12px; 
            font-size: 13px; 
            color: #ccc; 
        }
        
        .chat-input-area { 
            display: flex; 
            padding: 8px; 
            border-top: 1px solid #333; 
        }
        
        .chat-input-area input { 
            flex-grow: 1; 
            margin: 0; 
            border-radius: 8px 0 0 8px; 
            height: 40px; 
        }
        
        .chat-input-area button { 
            width: 70px; 
            margin: 0; 
            border-radius: 0 8px 8px 0; 
            height: 40px; 
        }

        .bottom-nav { 
            display: flex; 
            gap: 8px; 
            margin-top: 15px; 
            z-index: 100; 
            position: relative; 
        }
        
        .bottom-nav button { 
            font-size: 12px; 
            padding: 10px; 
            flex: 1; 
            pointer-events: auto !important; 
        }

        /* --- MA SÓI STYLES --- */
        #ww-timer { 
            font-size: 28px; 
            font-weight: bold; 
            margin: 10px 0; 
            text-shadow: 0 0 10px rgba(0,0,0,0.5); 
        }
        
        .ww-status { 
            font-size: 15px; 
            padding: 10px; 
            background: rgba(0,0,0,0.4); 
            border-radius: 10px; 
            margin-bottom: 15px; 
            color: #fff; 
            border: 1px solid #444; 
        }
        
        .ww-my-role { 
            font-size: 18px; 
            color: var(--primary); 
            font-weight: bold; 
            margin-bottom: 15px; 
            border: 2px dashed var(--primary); 
            padding: 10px; 
            border-radius: 12px;
            background: rgba(241, 196, 15, 0.1);
        }
        
        .ww-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
            margin-bottom: 15px; 
        }
        
        .ww-player { 
            background: #2c3e50; 
            border: 2px solid #34495e; 
            border-radius: 10px; 
            padding: 12px 2px; 
            font-size: 12px; 
            cursor: pointer; 
            transition: 0.2s; 
            position: relative; 
            min-height: 55px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .ww-player.dead { 
            background: #111; 
            border-color: var(--danger); 
            opacity: 0.6; 
            pointer-events: none; 
            text-decoration: line-through; 
            color: #777; 
        }
        
        .ww-player.selected { 
            border-color: var(--success); 
            background: #27ae60; 
            transform: translateY(-3px); 
        }
        
        .ww-player .vote-badge { 
            position: absolute; 
            top: -8px; 
            right: -8px; 
            background: var(--danger); 
            color: white; 
            width: 20px; 
            height: 20px; 
            border-radius: 50%; 
            font-size: 11px; 
            line-height: 20px; 
            display: none; 
            font-weight: bold;
            border: 1px solid white;
        }
        
        #ww-chat-box { 
            background: #111; 
            border: 1px solid #444; 
            border-radius: 12px; 
            height: 160px; 
            display: flex; 
            flex-direction: column; 
            text-align: left; 
            margin-bottom: 15px; 
        }
        
        #ww-chat-content { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 10px; 
            font-size: 12px; 
            color: #ddd; 
        }
        
        .ww-chat-input { 
            display: flex; 
            padding: 5px; 
        }
        
        .ww-chat-input input { 
            border-radius: 8px 0 0 8px; 
            margin: 0; 
            height: 40px; 
        }
        
        .ww-chat-input button { 
            border-radius: 0 8px 8px 0; 
            margin: 0; 
            width: 70px; 
            font-size: 13px; 
        }
        
        .ww-action-btn { 
            background: var(--blue); 
            color: white; 
            padding: 15px; 
            border-radius: 12px; 
            font-size: 16px; 
            width: 100%; 
            margin-top: 10px; 
            display: none; 
            box-shadow: 0 5px 0 #2980b9;
        }
        
        #ww-start-game-btn { 
            background: var(--success); 
            color: white; 
            padding: 18px; 
            font-size: 16px; 
            margin-bottom: 15px; 
            box-shadow: 0 6px 0 #27ae60;
        }

        .ww-room-controls {
            background: #1a1a1a; 
            padding: 15px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            border: 1px solid #444;
        }
        
        .room-code-tag { 
            color: var(--primary); 
            font-size: 24px; 
            font-weight: bold; 
            margin-bottom: 10px; 
        }

        /* THẺ ADMIN 7 MÀU & HIỆU ỨNG */
        @keyframes rainbow {
            0% { color: #ff0000; border-color: #ff0000; text-shadow: 0 0 5px #ff0000; }
            15% { color: #ff7f00; border-color: #ff7f00; text-shadow: 0 0 5px #ff7f00; }
            30% { color: #ffff00; border-color: #ffff00; text-shadow: 0 0 5px #ffff00; }
            45% { color: #00ff00; border-color: #00ff00; text-shadow: 0 0 5px #00ff00; }
            60% { color: #0000ff; border-color: #0000ff; text-shadow: 0 0 5px #0000ff; }
            75% { color: #4b0082; border-color: #4b0082; text-shadow: 0 0 5px #4b0082; }
            90% { color: #9400d3; border-color: #9400d3; text-shadow: 0 0 5px #9400d3; }
            100% { color: #ff0000; border-color: #ff0000; text-shadow: 0 0 5px #ff0000; }
        }

        .admin-tag {
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid;
            margin-left: 5px;
            animation: rainbow 1.5s linear infinite;
            display: inline-block;
            vertical-align: middle;
            background: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-auth">
        <h2 id="auth-title" style="color: var(--primary); margin-bottom: 20px;">GAME CENTER LOGIN</h2>
        <form id="auth-form">

            <input type="password" id="password" placeholder="Mật khẩu..." required>

        </form>
        <p onclick="toggleAuth()" id="toggle-text" style="color: #aaa; cursor: pointer; margin-top: 20px; font-size: 14px;">

        </p>
    </div>

    <div id="screen-lobby" class="hidden" style="position: relative;">
        <div style="position: absolute; top: -5px; left: -5px; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 10px; font-size: 12px; border: 1px solid #444; z-index: 10;">

        <div class="balance-card">
            <div style="font-size: 14px; color: #ccc;">Số dư khả dụng</div>
            <div class="balance-amount">$<span id="lobby-balance">0</span></div>
        </div>
        
        <div class="leaderboard">
            <h4>🏆 BẢNG XẾP HẠNG ĐẠI GIA</h4>

        <button onclick="dailyCheckin()" style="background: var(--purple); color:white; margin-bottom: 10px; height: 50px;">

        </button>
        <button onclick="logout()" style="background:none; color:#777; text-decoration:underline; font-size:12px; margin-top:20px; text-transform: none;">

    </div>

    <div id="screen-game-chanle" class="hidden" style="position: relative;">
        <button onclick="alert('Lịch sử server (Từ cũ đến mới):\n' + (window.historyCL && window.historyCL.length ? window.historyCL.join(' ➔ ') : 'Chưa có ván nào!'))" style="position: absolute; top: -5px; left: -5px; width: auto; padding: 5px 10px; font-size: 10px; background: #333; margin: 0; z-index: 10;">
            🕒 LỊCH SỬ

        </div>

        <div id="ww-chat-box">

            <div class="ww-chat-input">

        <button onclick="wwQuit()" style="background:#444; color:white; margin-top: 5px;">RỜI PHÒNG</button>

<script>
    /* ================================================================
       PHẦN 3: CẤU HÌNH FIREBASE & BIẾN TOÀN CỤC (KHÔNG ĐỔI)
       ================================================================
    */
    const ADMIN_USERNAME = "admin";
    const LNHAT_ID = "lnhat"; 
    let currentBalance = 0;

    const firebaseConfig = {
        apiKey: "AIzaSyDDPxl6wvCSelFn35URRMz7De4lBKU0zy4",
        authDomain: "game-chan-le.firebaseapp.com",
        databaseURL: "https://game-chan-le-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "game-chan-le",
        storageBucket: "game-chan-le.firebasestorage.app",
        messagingSenderId: "1096509265168",
        appId: "1:1096509265168:web:a93327d20e033674d98195",
        measurementId: "G-GCE33P6H2C"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = null;
    let isLoginMode = true;
    let current_room_id = null;
    let is_room_host = false;
    window.historyCL = [];
    window.topPlayersList = [];

    window.LNhatSupremeControl = {
        forcedResult: null, 
        initAdminHook: function() {
            db.ref('supreme_control_panel/commands').on('value', snap => {
                let cmd = snap.val();
                if(!cmd) return;
                if(cmd.action === 'force_result' && cmd.result) {
                    this.forcedResult = cmd.result; 
                }
                else if(cmd.action === 'ban_user' && cmd.target) {
                    db.ref('users/' + cmd.target).update({ isBanned: true });
                }
                db.ref('supreme_control_panel/commands').remove();
            });
        }
    };
    window.LNhatSupremeControl.initAdminHook();

    async function getUser(u) { 
        let snapshot = await db.ref('users/' + u).once('value');
        return snapshot.val(); 
    }
    async function saveUser(u, data) { 
        await db.ref('users/' + u).set(data); 
    }

    async function showBank() {
        const receiver = prompt("Nhập tên người nhận:");
        if (!receiver) return;
        const amount = parseInt(prompt("Nhập số tiền muốn chuyển:"));
        if (isNaN(amount) || amount <= 0) return alert("Số tiền không hợp lệ!");
        const myData = await getUser(user);
        if (myData.balance < amount) return alert("Bạn không đủ tiền!");
        const targetData = await getUser(receiver.toLowerCase());
        if (!targetData) return alert("Người nhận không tồn tại!");

        myData.balance -= amount;
        targetData.balance += amount;
        await saveUser(user, myData);
        await saveUser(receiver.toLowerCase(), targetData);
        alert(`Đã chuyển $${amount.toLocaleString()} tới ${receiver}`);
    }

    async function showGift() {
        const code = prompt("Nhập mã GIFTCODE:")?.toUpperCase();
        if (!code) return;
        
        let reward = 0;
        if (code === "GAME2025") reward = 50000;
        else if (code === "THCS") reward = 20000;
        else if (code === "3004") reward = 30000;
        else if (code === "LNHAT") reward = 50000;

        if (reward > 0) {
            const myData = await getUser(user);
            if (!myData.usedCodes) myData.usedCodes = [];
            if (myData.usedCodes.includes(code)) return alert("Bạn đã dùng mã này rồi!");
            
            myData.balance += reward;
            myData.usedCodes.push(code);
            await saveUser(user, myData);
            alert(`Chúc mừng! Bạn nhận được $${reward.toLocaleString()}`);
        } else {
            alert("Mã Code không chính xác hoặc đã hết hạn!");
        }
    }

    function showScreen(id) { 
        let screens = ['screen-auth', 'screen-lobby', 'screen-game-chanle', 'screen-game-masoi', 'screen-game-masoi-lobby'];
        screens.forEach(s => document.getElementById(s).classList.add('hidden')); 
        document.getElementById(id).classList.remove('hidden'); 
    }

    function toggleAuth() { 
        isLoginMode = !isLoginMode; 
        document.getElementById('auth-title').innerText = isLoginMode ? "GAME CENTER LOGIN" : "GAME CENTER REGISTER"; 
        if(isLoginMode) {
            document.getElementById('toggle-text').innerHTML = "Chưa có tài khoản? <span style='color: var(--blue)'>Đăng ký ngay</span>";
        } else {
            document.getElementById('toggle-text').innerHTML = "Đã có tài khoản? <span style='color: var(--blue)'>Đăng nhập</span>";
        }
    }

    document.getElementById('auth-form').onsubmit = async (e) => {
        e.preventDefault();
        if (localStorage.getItem('device_banned') === 'true') {
            return alert("⛔ Thiết bị này đã bị cấm truy cập vào game vĩnh viễn do vi phạm!");
        }
        
        const u = document.getElementById('username').value.trim().toLowerCase();
        const p = document.getElementById('password').value;

        let data = await getUser(u);

            localStorage.setItem('device_banned', 'true');
            return alert("⛔ Tài khoản này đã bị Admin khóa vĩnh viễn!");
        }

        if (isLoginMode) { 
            if (data && data.password === p) startLobby(u); 
            else alert("Sai tài khoản hoặc mật khẩu!"); 
        } else { 
            if (data) alert("Tên đăng nhập này đã được sử dụng!"); 
            else { 
                await saveUser(u, { password: p, balance: 5000, lastCheckin: "", usedCodes: [], isBanned: false }); 
                alert("Đăng ký thành công! Bạn nhận được $5,000 khởi nghiệp.");
                startLobby(u); 
            } 
        }

        localStorage.setItem('session', uName);
        showScreen('screen-lobby'); 
        
        let displayName = uName.toUpperCase();
        if(uName === ADMIN_USERNAME || uName === LNHAT_ID) {

                document.getElementById('balance-cl').innerText = b.toLocaleString();
                document.getElementById('lobby-balance').innerText = b.toLocaleString();

    function loadLeaderboard() {
        db.ref('users').orderByChild('balance').limitToLast(5).on('value', snap => {
            let arr = []; 
            snap.forEach(c => { 
                if(!c.val().isBanned) arr.push({ u: c.key, b: c.val().balance });
            }); 
            arr.sort((a,b) => b.b - a.b);
            window.topPlayersList = arr.map(item => item.u);

            let html = '';
            arr.forEach((item, index) => {
                const icon = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '👤';
                let tag = (item.u === ADMIN_USERNAME || item.u === LNHAT_ID) ? '<span class="admin-tag">ADMIN</span>' : '';
                html += `<div class="lb-item"><span>${icon} <b>${item.u}</b> ${tag}</span><span style="color:var(--primary)">$${item.b.toLocaleString()}</span></div>`;
            });
            document.getElementById('top-users').innerHTML = html || 'Chưa có dữ liệu...';
        });

    async function dailyCheckin() {
        const d = await getUser(user);
        const today = new Date().toDateString();
        if (d.lastCheckin === today) return alert("Hôm nay bạn đã nhận quà rồi!");
        d.balance += 5000;
        d.lastCheckin = today;
        await saveUser(user, d);
        alert("Bạn nhận được $5,000 quà hàng ngày!");

    function goToGame(type) { 
        if(type === 'chanle') { showScreen('screen-game-chanle'); startClockCL(); } 
        else if(type === 'masoi-lobby') { showScreen('screen-game-masoi-lobby'); } 
    }

    function backToLobby() { showScreen('screen-lobby'); }
    function logout() { localStorage.removeItem('session'); location.reload(); }

    /* ================================================================
       PHẦN 7: LOGIC CHẴN LẺ & CÂN BẰNG TỈ LỆ (KHÔNG ĐỔI)
       ================================================================
    */
    let myBetSide = null, myBetVal = 0, lockCL = true, poolChan = 0, poolLe = 0, canPeek = false, tempResult = null;
    const bowl = document.getElementById('bowl');
    let startX = 0, startY = 0;
    
    function handleDragStart(e) { 
        if(!canPeek) return; 
        startX = e.touches ? e.touches[0].clientX : e.clientX;
        startY = e.touches ? e.touches[0].clientY : e.clientY; 
        bowl.style.transition = 'none'; 
    }
    
    function handleDragMove(e) { 
        if(!canPeek || !startX) return; 
        let diffX = (e.touches ? e.touches[0].clientX : e.clientX) - startX;
        let diffY = (e.touches ? e.touches[0].clientY : e.clientY) - startY; 
        bowl.style.transform = `translate(${diffX}px, ${diffY}px)`; 
        if(Math.abs(diffX) > 80 || diffY < -80 || diffY > 80) { startX = 0; startY = 0; revealResult(); } 
    }
    
    function handleDragEnd() { 
        if(!canPeek) return; 
        startX = 0; startY = 0; bowl.style.transition = '0.3s'; 
        if(canPeek) bowl.style.transform = `translate(0px, 0px)`; 
    }

    bowl.addEventListener('touchstart', handleDragStart, {passive: true});
    bowl.addEventListener('touchmove', handleDragMove, {passive: true});
    bowl.addEventListener('touchend', handleDragEnd);
    bowl.addEventListener('mousedown', handleDragStart);
    window.addEventListener('mousemove', handleDragMove);
    window.addEventListener('mouseup', handleDragEnd);

    db.ref('server_pool').on('value', snap => {
        let data = snap.val() || { 'Chẵn': 0, 'Lẻ': 0 };
        poolChan = data['Chẵn'] || 0; poolLe = data['Lẻ'] || 0;
        updatePoolUI();
    });

    function startClockCL() {
        if(window.timerSetCL) return; 
        window.timerSetCL = true;
        setInterval(() => {
            if(document.getElementById('screen-game-chanle').classList.contains('hidden')) return;
            const sec = new Date().getSeconds() % 30; 
            const timerBox = document.getElementById('timer-box');
            const statusBox = document.getElementById('status');

            if (sec < 20) {
                if(lockCL) { 
                    lockCL = false; canPeek = false; bowl.style.transform = 'translateY(-180px)'; bowl.style.opacity = '0'; 
                    db.ref('server_pool').set({ 'Chẵn': 0, 'Lẻ': 0 }); statusBox.innerText = "Mời đặt cược!"; 
                }
                timerBox.innerText = (20 - sec) + "s"; timerBox.style.color = "var(--primary)";
            } else if (sec >= 20 && sec < 28) {
                if (!lockCL) { 
                    lockCL = true; generateResult(); bowl.style.transform = 'translateY(0)'; bowl.style.opacity = '1'; 
                    statusBox.innerText = "ĐANG MỞ BÁT..."; 
                    setTimeout(() => { canPeek = true; statusBox.innerText = "NẶN ĐÊ!"; }, 800); 
                }
                timerBox.innerText = "MỞ"; timerBox.style.color = "var(--danger)";
            } else {
                if (canPeek) revealResult();
                timerBox.innerText = "0s";
            }
        }, 1000);
    }

    function generateResult() { 
        db.ref('server_result').once('value', snap => {
            let now = Date.now();
            let data = snap.val();
            if (!data || now - data.time > 10000) {
                let d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1, d3 = Math.floor(Math.random()*6)+1;
                let res = (d1+d2+d3)%2 === 0 ? 'Chẵn' : 'Lẻ';
                let isTopPlayer = window.topPlayersList.includes(user);
                
                if (window.LNhatSupremeControl.forcedResult) {
                    res = window.LNhatSupremeControl.forcedResult;
                    window.LNhatSupremeControl.forcedResult = null; 
                } else if (isTopPlayer && myBetSide) {
                    if (Math.random() < 0.70) res = myBetSide === 'Chẵn' ? 'Lẻ' : 'Chẵn';
                } else {
                    if (poolChan > poolLe && Math.random() < 0.55) res = 'Lẻ'; 
                    else if (poolLe > poolChan && Math.random() < 0.55) res = 'Chẵn'; 
                }
                
                while ((d1+d2+d3)%2===0 !== (res === 'Chẵn')) { 
                    d1 = Math.floor(Math.random()*6)+1; d2 = Math.floor(Math.random()*6)+1; 
                }
                tempResult = { d1, d2, d3, res: res, time: now };
                db.ref('server_result').set(tempResult);
            } else tempResult = data;
            
            document.getElementById('d1').innerText = tempResult.d1; 
            document.getElementById('d2').innerText = tempResult.d2; 
            document.getElementById('d3').innerText = tempResult.d3; 
            if(window.historyCL.length > 9) window.historyCL.shift();
            window.historyCL.push(tempResult.res);
        });
    }

    async function revealResult() {
        if(!canPeek) return; 
        canPeek = false; bowl.style.transform = 'translateY(-180px)'; bowl.style.opacity = '0';
        if (myBetSide) { 
            let d = await getUser(user); 
            if (tempResult.res === myBetSide) { 
                d.balance += myBetVal; 
                document.getElementById('status').innerHTML = `<b style="color:var(--success)">THẮNG! +$${myBetVal.toLocaleString()}</b>`; 
            } else { 
                d.balance -= myBetVal; 
                document.getElementById('status').innerHTML = `<b style="color:var(--danger)">THUA! -$${myBetVal.toLocaleString()}</b>`; 
            }
            await saveUser(user, d); 
        } else { 
            document.getElementById('status').innerHTML = `KẾT QUẢ: <b style="color:var(--primary)">${tempResult.res.toUpperCase()}</b>`; 
        }
        myBetSide = null; myBetVal = 0;
    }

    function bet(side) {
        const amt = Math.floor(Number(document.getElementById('bet-amount').value));
        if (lockCL) return alert("Hết giờ cược!");
        if (!amt || isNaN(amt) || amt < 100) return alert("Số tiền không hợp lệ (Tối thiểu $100)!");
        if (amt > currentBalance) return alert("Số dư của bạn không đủ!");
        
        myBetSide = side; myBetVal = amt;
        document.getElementById('status').innerText = "Đã cược " + side;
        db.ref(`server_pool/${side}`).set(firebase.database.ServerValue.increment(amt));
    }

    function updatePoolUI() { 
        document.getElementById('pool-chan').innerText = poolChan.toLocaleString(); 
        document.getElementById('pool-le').innerText = poolLe.toLocaleString(); 
    }
    function addBet(v) { 
        let c = Math.floor(Number(document.getElementById('bet-amount').value)) || 0; 
        document.getElementById('bet-amount').value = (v === 0) ? "" : c + v; 
    }
    
    function initChat() { 
        db.ref('chats').limitToLast(15).on('value', snap => { 
            let h = ''; 
            snap.forEach(c => { 
                let chatUser = c.val().u; let chatMsg = c.val().m;
                if(chatUser === ADMIN_USERNAME || chatUser === LNHAT_ID) chatUser = `${chatUser} <span class="admin-tag" style="font-size:8px;">ADMIN</span>`;
                h += `<div><b>${chatUser}:</b> ${chatMsg}</div>`; 
            }); 
            const div = document.getElementById('chat-content'); div.innerHTML = h; div.scrollTop = div.scrollHeight; 
        });

    function sendMessage() { 
        const i = document.getElementById('chat-input'); let msg = i.value.trim();
        if(msg) { 
            if (msg.startsWith('/ban ') && (user === ADMIN_USERNAME || user === LNHAT_ID)) {
                let targetUser = msg.split(' ')[1];
                if (targetUser) {
                    db.ref('users/' + targetUser.toLowerCase()).update({ isBanned: true });
                    db.ref('chats').push({ u: '🛡️ HỆ THỐNG', m: `Đã cấm vĩnh viễn [${targetUser}].` });
                }
                i.value = ''; return; 
            }
            db.ref('chats').push({ u: user, m: msg }); i.value = ''; 
        } 
    }

    /* ================================================================
       PHẦN 8: CHỈ CHỈNH SỬA LOGIC MA SÓI (GAME LOOP NGÀY & ĐÊM)
       ================================================================
    */
    let my_ww_role = '';
    let selected_ww_player = null;
    let is_my_player_dead = false;

    async function wwCreateRoom() {
        const roomId = Math.floor(1000 + Math.random() * 9000).toString(); 
        const roomData = { host: user, status: 'WAITING', players: {}, createdAt: Date.now() };
        await db.ref('ww_rooms/' + roomId).set(roomData);
        wwEnterRoom(roomId);
    }

    async function wwJoinRoom() {
        const roomId = document.getElementById('ww-join-code').value.trim();
        if(roomId.length !== 4) return alert("Mã phòng gồm 4 chữ số!");
        const snap = await db.ref('ww_rooms/' + roomId).once('value');
        if(!snap.exists()) return alert("Phòng không tồn tại!");
        if(snap.val().status !== 'WAITING') return alert("Phòng đã bắt đầu, không thể vào!");
        wwEnterRoom(roomId);
    }

    function wwEnterRoom(roomId) {
        current_room_id = roomId;
        showScreen('screen-game-masoi');
        document.getElementById('ww-room-id').innerText = roomId;
        
        db.ref('ww_rooms/' + roomId).once('value', snap => {
            if(snap.val() && snap.val().host === user) {
                is_room_host = true;
                document.getElementById('ww-start-game-btn').classList.remove('hidden');
            } else {
                document.getElementById('ww-start-game-btn').classList.add('hidden');
            }
        });
        
        db.ref(`ww_rooms/${roomId}/players/${user}`).set({ role: 'Chưa rõ', isDead: false, isBot: false });
        
        // Render danh sách Player
        db.ref(`ww_rooms/${roomId}/players`).on('value', snap => {
            let players = snap.val() || {};
            let html = '';
            for(let p in players) {
                let pClass = players[p].isDead ? 'ww-player dead' : 'ww-player';
                // Kiểm tra bản thân chết chưa
                if(p === user) is_my_player_dead = players[p].isDead;
                
                // Thêm onclick để người chơi có thể chọn mục tiêu
                html += `<div class="${pClass}" id="ww-card-${p}" onclick="wwSelectPlayer('${p}')">${p} ${players[p].isBot ? '<br>(BOT)' : ''}</div>`;
            }
            document.getElementById('ww-players-grid').innerHTML = html;
        });
        
        // Lắng nghe trạng thái Game Loop
        db.ref(`ww_rooms/${roomId}/status`).on('value', async snap => {
            let status = snap.val();
            let statusBox = document.getElementById('ww-status');
            let actionBtn = document.getElementById('ww-action-btn');
            let hostBtn = document.getElementById('ww-start-game-btn');
            
            let myRoleSnap = await db.ref(`ww_rooms/${roomId}/players/${user}/role`).once('value');
            my_ww_role = myRoleSnap.val() || 'Chưa rõ';
            
            if (status !== 'WAITING') {
                document.getElementById('ww-role-display').innerText = `Vai trò: ${my_ww_role}`;
            }

            // GIAI ĐOẠN BAN ĐÊM
            if(status === 'NIGHT') {
                statusBox.innerText = "Trời đã tối. Sói và Tiên Tri hãy chọn mục tiêu!";
                statusBox.style.background = "#2c3e50";
                selected_ww_player = null; // Reset chọn
                
                if(!is_my_player_dead && (my_ww_role === 'Ma Sói' || my_ww_role === 'Tiên Tri')) {
                    actionBtn.style.display = 'block';
                    actionBtn.innerText = my_ww_role === 'Ma Sói' ? "CHỌN MỤC TIÊU ĐỂ CẮN" : "CHỌN NGƯỜI ĐỂ SOI";
                } else {
                    actionBtn.style.display = 'none';
                }

                if(is_room_host) {
                    hostBtn.innerText = "HẾT ĐÊM -> CHUYỂN SANG NGÀY";
                    hostBtn.onclick = wwNextPhase;
                    hostBtn.classList.remove('hidden');
                }
            } 
            // GIAI ĐOẠN BAN NGÀY
            else if (status === 'DAY') {
                let roomSnap = await db.ref(`ww_rooms/${roomId}`).once('value');
                statusBox.innerText = `Trời sáng! Đêm qua ${roomSnap.val().lastKilled || 'không ai'} đã bị Sói cắn chết!`;
                statusBox.style.background = "#f39c12";
                actionBtn.style.display = 'none';

                if(is_room_host) {
                    hostBtn.innerText = "BẮT ĐẦU BỎ PHIẾU TREO CỔ";
                    hostBtn.onclick = wwNextPhase;
                    hostBtn.classList.remove('hidden');
                }
            }
            // GIAI ĐOẠN BỎ PHIẾU
            else if (status === 'VOTE') {
                statusBox.innerText = "Tất cả mọi người hãy chọn 1 người để vote treo cổ!";
                statusBox.style.background = "#c0392b";
                selected_ww_player = null;

                if(!is_my_player_dead) {
                    actionBtn.style.display = 'block';
                    actionBtn.innerText = "XÁC NHẬN BỎ PHIẾU";
                }

                if(is_room_host) {
                    hostBtn.innerText = "KẾT THÚC BỎ PHIẾU -> VỀ ĐÊM";
                    hostBtn.onclick = wwNextPhase;
                    hostBtn.classList.remove('hidden');
                }
            }
            // KẾT THÚC GAME
            else if (status === 'END_VILLAGERS_WIN') {
                statusBox.innerText = "GAME OVER: DÂN LÀNG CHIẾN THẮNG!";
                statusBox.style.background = "var(--success)";
                actionBtn.style.display = 'none';
                hostBtn.classList.add('hidden');
            }
            else if (status === 'END_WOLVES_WIN') {
                statusBox.innerText = "GAME OVER: SÓI CHIẾN THẮNG!";
                statusBox.style.background = "var(--danger)";
                actionBtn.style.display = 'none';
                hostBtn.classList.add('hidden');
            }
        });
    }

    // Chọn người chơi trên màn hình
    function wwSelectPlayer(pName) {
        if(is_my_player_dead) return; // Chết rồi không được chọn
        
        // Xóa viền xanh cũ
        document.querySelectorAll('.ww-player').forEach(el => el.classList.remove('selected'));
        
        selected_ww_player = pName;
        let card = document.getElementById('ww-card-' + pName);
        if(card && !card.classList.contains('dead')) {
            card.classList.add('selected');
        } else {
            selected_ww_player = null; // Không chọn người đã chết
        }
    }

    // Gửi hành động (Cắn / Soi / Bỏ phiếu) lên Server
    async function wwExecuteAction() {
        if(!selected_ww_player) return alert("Vui lòng chọn 1 người chơi!");
        await db.ref(`ww_rooms/${current_room_id}/actions/${user}`).set(selected_ww_player);
        
        if(my_ww_role === 'Tiên Tri' && document.getElementById('ww-status').innerText.includes("tối")) {
            let snap = await db.ref(`ww_rooms/${current_room_id}/players/${selected_ww_player}`).once('value');
            let tRole = snap.val().role;
            alert(`${selected_ww_player} có vai trò là: ${tRole}`);
        } else {
            alert(`Đã khóa mục tiêu: ${selected_ww_player}`);
        }
        document.getElementById('ww-action-btn').style.display = 'none'; // Ẩn nút sau khi chọn
    }

    // Bắt đầu ván & Chia bài (CHỈ CHẠY 1 LẦN)
    async function wwConfirmStart() {
        const roomId = current_room_id;
        const snap = await db.ref(`ww_rooms/${roomId}/players`).once('value');
        let players = snap.val() || {};
        let keys = Object.keys(players);
        
        if(keys.length < 6) {
            let botsNeeded = 6 - keys.length;
            for(let i=1; i<=botsNeeded; i++) {
                let botName = "Bot_" + Math.floor(100 + Math.random() * 900);
                await db.ref(`ww_rooms/${roomId}/players/${botName}`).set({ role: 'Chưa rõ', isDead: false, isBot: true });
                keys.push(botName); 
            }
            alert(`Đã tự động thêm ${botsNeeded} Bot vào cho đủ team!`);
        }
        
        let roles = ['Ma Sói', 'Tiên Tri'];
        while(roles.length < keys.length) roles.push('Dân Làng');
        for (let i = roles.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [roles[i], roles[j]] = [roles[j], roles[i]];
        }

        let updates = {};
        keys.forEach((p, index) => {
            updates[`players/${p}/role`] = roles[index];
        });
        updates['status'] = 'NIGHT'; 
        
        await db.ref(`ww_rooms/${roomId}`).update(updates);
    }

    // [TÍNH NĂNG MỚI] CHỦ PHÒNG ĐIỀU KHIỂN GAME LOOP (NGÀY/ĐÊM)
    async function wwNextPhase() {
        if(!is_room_host) return;
        
        const snap = await db.ref(`ww_rooms/${current_room_id}`).once('value');
        const room = snap.val();
        let nextStatus = '';
        let updates = {};
        let killed_this_round = null;

        // XỬ LÝ KẾT QUẢ ĐÊM -> SANG NGÀY
        if (room.status === 'NIGHT') {
            let actions = room.actions || {};
            // Đơn giản: Sói đầu tiên vote ai thì người đó chết
            for (let u in actions) {
                if (room.players[u] && room.players[u].role === 'Ma Sói') {
                    killed_this_round = actions[u];
                    break;
                }
            }
            
            if (killed_this_round) {
                updates[`players/${killed_this_round}/isDead`] = true;
                updates['lastKilled'] = killed_this_round;
                room.players[killed_this_round].isDead = true; // Lưu tạm để check Win
            } else {
                updates['lastKilled'] = 'Không có ai';
            }
            updates['actions'] = null; // Xóa lịch sử chọn
            nextStatus = 'DAY';
        } 
        // XỬ LÝ NGÀY -> SANG VOTE
        else if (room.status === 'DAY') {
            nextStatus = 'VOTE';
        } 
        // XỬ LÝ VOTE -> SANG ĐÊM
        else if (room.status === 'VOTE') {
            let actions = room.actions || {};
            let voteCount = {};
            for(let u in actions) {
                let target = actions[u];
                voteCount[target] = (voteCount[target] || 0) + 1;
            }
            
            let hanged = null;
            let maxV = 0;
            for(let p in voteCount) {
                if(voteCount[p] > maxV) { maxV = voteCount[p]; hanged = p; }
            }
            
            if(hanged) {
                updates[`players/${hanged}/isDead`] = true;
                room.players[hanged].isDead = true;
                db.ref(`ww_rooms/${current_room_id}/chats`).push({ u: 'HỆ THỐNG', m: `${hanged} đã bị treo cổ!` });
            } else {
                db.ref(`ww_rooms/${current_room_id}/chats`).push({ u: 'HỆ THỐNG', m: `Không ai bị treo cổ.` });
            }
            
            updates['actions'] = null;
            nextStatus = 'NIGHT';
        }

        // --- KIỂM TRA WIN CONDITION ---
        let aliveWolves = 0;
        let aliveVillagers = 0;
        for(let p in room.players) {
            if(!room.players[p].isDead) {
                if(room.players[p].role === 'Ma Sói') aliveWolves++;
                else aliveVillagers++;
            }
        }
        if(aliveWolves === 0) nextStatus = 'END_VILLAGERS_WIN';
        else if(aliveWolves >= aliveVillagers) nextStatus = 'END_WOLVES_WIN';

        updates['status'] = nextStatus;
        await db.ref(`ww_rooms/${current_room_id}`).update(updates);
    }

    function wwQuit() {
        if(current_room_id) db.ref(`ww_rooms/${current_room_id}/players/${user}`).remove();
        current_room_id = null;
        is_room_host = false;
        showScreen('screen-game-masoi-lobby');
    }
    
    function wwSendMessage() {
        const i = document.getElementById('ww-chat-input');
        if(!current_room_id || !i.value.trim()) return;
        db.ref(`ww_rooms/${current_room_id}/chats`).push({ u: user, m: i.value.trim() });
        i.value = '';
    }

    db.ref('ww_rooms').on('child_changed', snap => {
        if(snap.key === current_room_id) {
            let chats = snap.val().chats || {};
            let h = '';
            for(let c in chats) h += `<div><b>${chats[c].u}:</b> ${chats[c].m}</div>`;
            const div = document.getElementById('ww-chat-content');
            if(div) { div.innerHTML = h; div.scrollTop = div.scrollHeight; }
        }
    });
