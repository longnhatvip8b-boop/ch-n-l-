<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Chẵn Lẻ V13 - UI Optimized</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --primary: #f1c40f; --success: #2ecc71; --danger: #e74c3c; --bg-dark: #121212; --blue: #3498db; --purple: #9b59b6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-dark); color: white; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 420px; margin: auto; background: #222; padding: 15px; border-radius: 25px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #444; background: #333; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .hidden { display: none !important; }
        
        /* Balance */
        .balance-card { background: linear-gradient(135deg, #333, #222); padding: 12px; border-radius: 15px; margin-bottom: 10px; border: 1px solid var(--primary); }
        .balance-amount { font-size: 24px; color: var(--primary); font-weight: bold; }
        
        /* Dice */
        .dice-container { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
        .dice { width: 45px; height: 45px; background: white; color: black; border-radius: 8px; line-height: 45px; font-size: 22px; font-weight: bold; }
        
        /* Betting Buttons & Pools Below */
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn-group button { flex: 1; font-size: 20px; color: white; height: 60px; }
        
        .bet-info-container { display: flex; gap: 8px; margin-top: 5px; margin-bottom: 15px; }
        .bet-pool { flex: 1; background: #1a1a1a; padding: 5px; border-radius: 0 0 10px 10px; border: 1px solid #333; border-top: none; }
        .pool-label { font-size: 10px; color: #777; }
        .pool-amount { font-size: 13px; color: var(--primary); font-weight: bold; }

        /* Chat */
        #chat-box { background: #1a1a1a; border-radius: 12px; border: 1px solid #333; margin-top: 15px; text-align: left; display: flex; flex-direction: column; height: 130px; }
        #chat-content { flex-grow: 1; overflow-y: auto; padding: 10px; font-size: 12px; color: #ccc; }
        .chat-input-area { display: flex; padding: 5px; border-top: 1px solid #333; }
        .chat-input-area input { flex-grow: 1; margin: 0; border-radius: 5px 0 0 5px; height: 35px; }

        /* Utils */
        .quick-bet { display: flex; gap: 3px; margin-bottom: 5px; }
        .quick-bet button { flex: 1; padding: 6px; font-size: 10px; background: #2a2a2a; color: white; }
        #timer-box { font-size: 32px; color: var(--primary); font-weight: bold; }
        #status { font-size: 14px; margin: 5px 0; min-height: 20px; color: #f1c40f; }
        .bottom-nav { display: flex; gap: 5px; margin-top: 10px; }
        .bottom-nav button { font-size: 11px; padding: 8px; flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-auth">
        <h3 id="auth-title">ĐĂNG NHẬP / ĐĂNG KÝ</h3>
        <form id="auth-form">
            <input type="text" id="username" placeholder="Tên đăng nhập" required>
            <input type="password" id="password" placeholder="Mật khẩu" required>
            <button type="submit" style="background: var(--success); color: white;">VÀO GAME</button>
        </form>
        <p onclick="toggleAuth()" id="toggle-text" style="color: #888; cursor: pointer; margin-top: 10px; font-size: 12px;">Đã có tài khoản? Đăng nhập</p>
    </div>

    <div id="screen-lobby" class="hidden">
        <h3>SẢNH CHỜ</h3>
        <p>Chào, <b id="lobby-name" style="color:var(--primary)"></b></p>
        <div class="balance-card">
            <div style="font-size: 12px;">Ví của bạn</div>
            <div class="balance-amount">$<span id="lobby-balance">0</span></div>
        </div>
        <button onclick="dailyCheckin()" style="background: var(--purple); color:white;">🎁 ĐIỂM DANH ($5,000)</button>
        <button onclick="goToGame()" style="padding:15px; background:var(--blue); color:white; font-size:18px;">🌍 VÀO PHÒNG CHUNG</button>
        <button onclick="logout()" style="background:none; color:#555; text-decoration:underline; font-size:11px;">Đăng xuất</button>
    </div>

    <div id="screen-game" class="hidden">
        <div class="balance-card">
            <div>Số dư: <span class="balance-amount">$<span id="balance">0</span></span></div>
        </div>

        <div id="timer-box">15s</div>
        <div class="dice-container">
            <div id="d1" class="dice">?</div>
            <div id="d2" class="dice">?</div>
            <div id="d3" class="dice">?</div>
        </div>

        <input type="number" id="bet-amount" style="text-align:center; font-size:20px;" placeholder="Tiền cược...">
        <div class="quick-bet">
            <button onclick="addBet(1000)">+1K</button>
            <button onclick="addBet(10000)">+10K</button>
            <button onclick="addBet(50000)">+50K</button>
            <button onclick="addBet(0)" style="color:var(--danger)">Xóa</button>
        </div>

        <div class="btn-group">
            <button onclick="bet('Chẵn')" style="background: var(--blue); border-radius: 8px 8px 0 0;">CHẴN</button>
            <button onclick="bet('Lẻ')" style="background: var(--danger); border-radius: 8px 8px 0 0;">LẺ</button>
        </div>
        <div class="bet-info-container">
            <div class="bet-pool">
                <div class="pool-label">TỔNG CHẴN</div>
                <div class="pool-amount">$<span id="pool-chan">0</span></div>
            </div>
            <div class="bet-pool">
                <div class="pool-label">TỔNG LẺ</div>
                <div class="pool-amount">$<span id="pool-le">0</span></div>
            </div>
        </div>

        <div id="status">Sẵn sàng đặt cược...</div>

        <div id="chat-box">
            <div id="chat-content"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Chat...">
                <button onclick="sendMessage()" style="width:60px; margin:0; background:var(--blue); color:white;">GỬI</button>
            </div>
        </div>

        <div class="bottom-nav">
            <button onclick="showGift()" style="background:var(--purple); color:white;">CODE</button>
            <button onclick="showBank()" style="background:var(--success); color:white;">BANK</button>
            <button onclick="backToLobby()" style="background:#444; color:white;">THOÁT</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDDPxl6wvCSelFn35URRMz7De4lBKU0zy4",
        authDomain: "game-chan-le.firebaseapp.com",
        databaseURL: "https://game-chan-le-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "game-chan-le",
        storageBucket: "game-chan-le.firebasestorage.app",
        messagingSenderId: "1096509265168",
        appId: "1:1096509265168:web:a93327d20e033674d98195"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = null, myBetSide = null, myBetVal = 0, lock = false, isLoginMode = true;
    let poolChan = 0, poolLe = 0;

    async function getUser(u) { return (await db.ref('users/' + u).once('value')).val(); }
    async function saveUser(u, data) { await db.ref('users/' + u).set(data); }

    function toggleAuth() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "ĐĂNG NHẬP" : "ĐĂNG KÝ";
        document.getElementById('toggle-text').innerText = isLoginMode ? "Chưa có tài khoản? Đăng ký" : "Đã có tài khoản? Đăng nhập";
    }

    document.getElementById('auth-form').onsubmit = async (e) => {
        e.preventDefault();
        const u = document.getElementById('username').value.trim().toLowerCase();
        const p = document.getElementById('password').value;
        let data = await getUser(u);
        if (isLoginMode) {
            if (data && data.password === p) startLobby(u); else alert("Sai thông tin!");
        } else {
            if (data) alert("Tên đã tồn tại!");
            else { await saveUser(u, { password: p, balance: 5000, lastCheckin: "", usedCodes: [] }); startLobby(u); }
        }
    };

    function startLobby(uName) {
        user = uName;
        localStorage.setItem('session', uName);
        showScreen('screen-lobby');
        document.getElementById('lobby-name').innerText = uName;
        db.ref('users/' + user).on('value', snap => {
            const d = snap.val();
            if(d) {
                document.getElementById('balance').innerText = d.balance.toLocaleString();
                document.getElementById('lobby-balance').innerText = d.balance.toLocaleString();
            }
        });
        initChat(); startBot();
    }

    function initChat() {
        db.ref('chats').limitToLast(15).on('value', snap => {
            let h = ''; snap.forEach(c => { const v = c.val(); h += `<div><b>${v.u}:</b> ${v.m}</div>`; });
            const div = document.getElementById('chat-content'); div.innerHTML = h; div.scrollTop = div.scrollHeight;
        });
    }

    function sendMessage() {
        const i = document.getElementById('chat-input'); if(!i.value.trim()) return;
        db.ref('chats').push({ u: user, m: i.value, t: firebase.database.ServerValue.TIMESTAMP }); i.value = '';
    }

    function startBot() {
        setInterval(() => {
            if (lock) return;
            poolChan += Math.floor(Math.random() * 2000) + 100;
            poolLe += Math.floor(Math.random() * 2000) + 100;
            updatePoolUI();
        }, 1500);
    }

    function updatePoolUI() {
        document.getElementById('pool-chan').innerText = poolChan.toLocaleString();
        document.getElementById('pool-le').innerText = poolLe.toLocaleString();
    }

    function startClock() {
        if(window.timerSet) return; window.timerSet = true;
        setInterval(() => {
            const sec = new Date().getSeconds() % 20;
            if (sec < 15) {
                lock = false; document.getElementById('timer-box').innerText = (15 - sec) + "s";
                document.getElementById('timer-box').style.color = "var(--primary)";
            } else {
                if (!lock) { lock = true; processResult(); }
                document.getElementById('timer-box').innerText = "LẮC!";
                document.getElementById('timer-box').style.color = "var(--danger)";
            }
        }, 1000);
    }

    async function bet(side) {
        if (lock) return;
        const amt = parseInt(document.getElementById('bet-amount').value);
        if (isNaN(amt) || amt < 100) return alert("Cược ít nhất $100");
        let d = await getUser(user);
        if (d.balance < amt) return alert("Không đủ tiền!");
        myBetSide = side; myBetVal = amt;
        if (side === 'Chẵn') poolChan += amt; else poolLe += amt;
        updatePoolUI();
        document.getElementById('status').innerText = `Đã cược ${side} $${amt.toLocaleString()}`;
    }

    async function processResult() {
        let winRate = 50;
        if (myBetSide) {
            const isHeavy = (myBetSide === 'Chẵn' && poolChan > poolLe) || (myBetSide === 'Lẻ' && poolLe > poolChan);
            winRate = isHeavy ? 30 : 70;
        }
        const d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1, d3 = Math.floor(Math.random()*6)+1;
        const res = ((d1+d2+d3) % 2 === 0) ? 'Chẵn' : 'Lẻ';
        document.getElementById('d1').innerText = d1; document.getElementById('d2').innerText = d2; document.getElementById('d3').innerText = d3;
        if (myBetSide) {
            let data = await getUser(user);
            if (res === myBetSide) data.balance += myBetVal; else data.balance -= myBetVal;
            await saveUser(user, data);
            document.getElementById('status').innerHTML = res === myBetSide ? `<b style="color:var(--success)">THẮNG +$${myBetVal.toLocaleString()}</b>` : `<b style="color:var(--danger)">THUA -$${myBetVal.toLocaleString()}</b>`;
        }
        myBetSide = null;
        setTimeout(() => { poolChan = 0; poolLe = 0; updatePoolUI(); document.getElementById('status').innerText = "Mời cược!"; }, 3000);
    }

    async function dailyCheckin() {
        let d = await getUser(user); const t = new Date().toDateString();
        if (d.lastCheckin === t) return alert("Đã nhận rồi!");
        d.balance += 5000; d.lastCheckin = t; await saveUser(user, d); alert("+$5,000!");
    }

    async function showGift() {
        const c = prompt("Nhập Code:").toUpperCase(); if(!c) return;
        let d = await getUser(user); if(!d.usedCodes) d.usedCodes = [];
        const cs = { "TANTHU": 10000, "LNHAT": 20000 };
        if (cs[c] && !d.usedCodes.includes(c)) {
            d.balance += cs[c]; d.usedCodes.push(c); await saveUser(user, d); alert("Thành công!");
        } else alert("Mã sai!");
    }

    async function showBank() {
        const to = prompt("Người nhận:").toLowerCase(); const a = parseInt(prompt("Số tiền:"));
        if (isNaN(a) || a <= 0 || to === user) return;
        let mD = await getUser(user), tD = await getUser(to);
        if (!tD || mD.balance < a) return alert("Lỗi!");
        mD.balance -= a; tD.balance += a; await saveUser(user, mD); await saveUser(to, tD); alert("Xong!");
    }

    function showScreen(id) {
        ['screen-auth', 'screen-lobby', 'screen-game'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    function backToLobby() { showScreen('screen-lobby'); }
    function goToGame() { showScreen('screen-game'); startClock(); }
    function logout() { localStorage.removeItem('session'); location.reload(); }
    function addBet(v) { let c = parseInt(document.getElementById('bet-amount').value) || 0; document.getElementById('bet-amount').value = (v === 0) ? "" : c + v; }

    window.onload = async () => {
        const s = localStorage.getItem('session');
        if (s) { const d = await getUser(s); if (d) startLobby(s); }
    };
</script>
</body>
</html>
